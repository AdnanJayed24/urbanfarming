services:
  postgres:
    image: postgres:16-alpine
    container_name: urbanfarming-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urbanfarming
    ports:
      - "5433:5432"
    volumes:
      - urbanfarming_postgres_data:/var/lib/postgresql/data

volumes:
  urbanfarming_postgres_data:
